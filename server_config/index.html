<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>NSCLC Spatial Atlas Mini</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; background: #1b1b1b; color: #fff; }
      #root { position: fixed; top: 44px; left: 0; right: 0; bottom: 22px; }
      #footer {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 22px;
        background: rgba(27,27,27,0.92);
        border-top: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        font-size: 11px;
        color: #888;
        z-index: 9999;
        font-family: monospace;
      }
      #footer a { color: #aaa; text-decoration: none; }
      #footer a:hover { color: #fff; }
      #footer code { font-size: 10px; color: #aaa; }
      #navbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 44px;
        background: rgba(27,27,27,0.95);
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 9999;
      }
      #navbar-title {
        font-size: 15px;
        font-weight: 600;
        color: #e8e8e8;
        letter-spacing: 0.01em;
      }
      #navbar-github {
        display: flex;
        align-items: center;
        color: #aaa;
        text-decoration: none;
        transition: color 0.15s;
      }
      #navbar-github:hover { color: #fff; }
    </style>
  </head>
  <body>
    <nav id="navbar">
      <span id="navbar-title">NSCLC Spatial Atlas Mini</span>
      <a id="navbar-github" href="https://github.com/rtubelleza/wtx_viewer_cloud" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">GitHub</a>
    </nav>

    <div id="root"></div>

    <footer id="footer">
      <span>Clinicalomx. doi: TBA.</span>
      <span>branch=<code>__GIT_BRANCH__</code> &nbsp; hash=<code>__GIT_HASH__</code> &nbsp; date=<code>__GIT_DATE__</code></span>
    </footer>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "vitessce": "https://unpkg.com/vitessce@latest"
        }
      }
    </script>

    <script type="module">
      import React from 'react';
      import { createRoot } from 'react-dom/client';
      import { Vitessce } from 'vitessce';

      const resp = await fetch('/config.json');
      if (!resp.ok) throw new Error(`Failed to load config.json: HTTP ${resp.status}`);
      const config = await resp.json();


      function App() {
        return React.createElement(Vitessce, {
          height: window.innerHeight - 44 - 22,
          theme: 'dark',
          config,
        });
      }

      createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
