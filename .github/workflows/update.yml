name: Update Viewer app/page on Nectar VM

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Pull latest code and restart containers
        run: |
          ssh ubuntu@${{ secrets.VM_IP }} << 'EOF'
            set -e
            cd /opt/wtx_viewer
            git pull origin main
            docker compose up --build -d --wait
          EOF

      # confirm the app running on app domain
      - name: Health check
        run: |
          sleep 5
          curl --fail --silent --max-time 30 \
            https://viewer.nsclc-spatial-atlas.cloud.edu.au \
            -o /dev/null \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)
