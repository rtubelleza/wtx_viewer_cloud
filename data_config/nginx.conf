server {
    listen 80;
    server_name _;

    # zarr chunks, cached with range key since chunks are fetched as partial content
    location /data/zarr/ {
        proxy_pass ${SWIFT_STORAGE_URL}/main/mosaic.zarr/;
        proxy_set_header X-Auth-Token "${SWIFT_AUTH_TOKEN}";
        proxy_set_header Host object-store.rc.nectar.org.au;
        proxy_hide_header X-Trans-Id;

        # hTTP/1.1 keepalive to Swift object store
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # cache zarr chunks on host disk — immutable so 30d is safe
        proxy_cache zarr_cache;
        proxy_cache_key "$uri$http_range";
        proxy_cache_valid 200 30d;
        proxy_cache_valid 206 30d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;

        # Buffer full response server-side before forwarding
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;

        types {
            application/json     json zattrs zgroup zarray zmetadata;
            application/octet-stream bin;
        }
        default_type application/octet-stream;
    }

    # zarr metadata files fetched on every session for every element
    # regex captures path after /data/zarr/ to correctly build the swif url
    location ~* ^/data/zarr/(.+\.(zattrs|zgroup|zarray|zmetadata))$ {
        proxy_pass ${SWIFT_STORAGE_URL}/main/mosaic.zarr/$1;
        proxy_set_header X-Auth-Token "${SWIFT_AUTH_TOKEN}";
        proxy_set_header Host object-store.rc.nectar.org.au;
        proxy_hide_header X-Trans-Id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache zarr_cache;
        proxy_cache_key "$uri";
        proxy_cache_valid 200 90d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
